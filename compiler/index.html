<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta http-equiv="refresh" content="0; url=simulation.html">
    <title>Complete Compiler</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root{
            --bg:#141414;
            --card:#181818;
            --border:#2a2a2a;
            --accent:#e50914;
            --text:#f5f5f1;
            --muted:#b3b3b3;
        }
        *{box-sizing:border-box}
        body{
            margin:0;
            min-height:100vh;
            display:grid;
            place-items:center;
            padding:24px;
            font-family:Inter,ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
            background:
                radial-gradient(circle at 20% 0%, rgba(229,9,20,.18), transparent 40%),
                radial-gradient(circle at 80% 10%, rgba(255,255,255,.05), transparent 45%),
                var(--bg);
            color:var(--text);
        }
        .wrap{width:min(720px,94vw);padding:28px 24px;border-radius:16px;background:linear-gradient(180deg,rgba(255,255,255,.04),rgba(255,255,255,0)),var(--card);border:1px solid var(--border);box-shadow:0 18px 60px rgba(0,0,0,.55)}
        h1{margin:0 0 10px;font-size:28px;letter-spacing:.1px;font-weight:900}
        p{margin:0;color:var(--muted);line-height:1.6;font-size:16px}
        a{color:var(--text);font-weight:700;text-decoration:none;border-bottom:1px solid rgba(229,9,20,.55)}
        a:hover{text-decoration:underline}
        .small{margin-top:10px;font-size:14px;opacity:.9}
        .logo{display:inline-flex;align-items:baseline;gap:10px;margin-bottom:8px}
        .logo-mark{color:var(--accent);font-weight:900;letter-spacing:1px}
        .logo-title{font-weight:800;letter-spacing:.6px}
    </style>
</head>
<body>
    <main class="wrap">
        <div class="logo">
            <div class="logo-mark">COMPILER</div>
            <div class="logo-title">Console</div>
        </div>
        <h1>Complete Compiler</h1>
        <p>Redirecting to <a href="simulation.html">Simulation</a>…</p>
        <p class="small">If you are not redirected automatically, open the link above.</p>
    </main>
</body>
</html>
